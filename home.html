<!DOCTYPE html>
<html lang="sl" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F7F4EF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>LONA OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="LONA OS"/>
  <meta name="theme-color" content="#F7F4EF"/>
</head>
<body>


  <!-- ── HEADER ──────────────────────────────────────────── -->
  <header class="top-bar">
    <div class="top-bar__logo">
      <span class="logo-bracket">[</span>LONA<span class="logo-accent">_OS</span><span class="logo-bracket">]</span>
    </div>
    <div class="top-bar__meta" onclick="location.href='index.html'" style="cursor:pointer;gap:6px" title="Zamenjaj agenta">
      <span class="status-dot" aria-label="Online"></span>
      <span class="top-bar__title" id="current-agent-name">Agent</span>
      <span style="font-size:.7rem;opacity:.5">⇄</span>
    </div>
    <button class="top-bar__alert" onclick="showSituationPicker()" title="Situacijska misija" style="margin-right:4px;background:#FF9500;border-color:#FF9500;color:white">📍</button>
  </header>

  <main class="main-scroll">

  <!-- COMMANDER PANEL -->
  <section id="cmd-panel-section">
    <!-- Generira renderCmdAgents() -->
  </section>

  <!-- KATEGORIJE — horizontal scroll -->
  <div class="cat-scroll-wrap">
    <div class="cat-scroll" id="cat-scroll">
      <button class="cat-pill cat-pill--active" data-cat="all">Vse</button>
      <button class="cat-pill" data-cat="hygiene">Higiena</button>
      <button class="cat-pill" data-cat="kitchen">Kuhinja</button>
      <button class="cat-pill" data-cat="cleaning">Čiščenje</button>
      <button class="cat-pill" data-cat="organisation">Organiz.</button>
      <button class="cat-pill" data-cat="care">Skrb</button>
      <button class="cat-pill" data-cat="outdoor">Outdoor</button>
      <button class="cat-pill" data-cat="body">Telo</button>
      <button class="cat-pill" data-cat="safety">Varnost</button>
      <button class="cat-pill" data-cat="money">Denar</button>
      <button class="cat-pill" data-cat="social">Socialne</button>
      <button class="cat-pill" data-cat="creativity">Um</button>
      <button class="cat-pill" data-cat="eq">EQ</button>
      <button class="cat-pill" data-cat="fear">Strah</button>
      <button class="cat-pill" data-cat="independence">Samostojnost</button>
      <button class="cat-pill" data-cat="custom">Moje</button>
    </div>
  </div>

  <!-- HEADER misij -->
  <div class="section-header" style="margin-bottom:0">
    <h3 class="section-header__title" id="missions-cat-title">⭐ Vse Misije</h3>
    <div style="display:flex;gap:6px;align-items:center">
      <button onclick="shuffleMissions()"
        style="padding:5px 10px;border-radius:20px;background:#007AFF;color:white;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:900;border:none;cursor:pointer;box-shadow:0 2px 0 rgba(0,122,255,.4)">↻</button>
      <button onclick="showSituationPicker()"
        style="padding:5px 10px;border-radius:20px;background:#FF9500;color:white;font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:900;border:none;cursor:pointer;box-shadow:0 2px 0 rgba(255,149,0,.4)">📍</button>
      <span class="section-header__badge" id="missions-badge">0</span>
    </div>
  </div>

  <!-- MISSIONS GRID — dinamično -->
  <section class="missions-wrapper">
    <div class="missions-grid" id="missions-grid"></div>
  </section>

</main>

  <!-- ── BOTTOM NAV ───────────────────────────────────────── -->
  <nav class="bottom-nav" aria-label="Navigacija">
    <button class="bottom-nav__item bottom-nav__item--active" aria-current="page" onclick="location.href='home.html'">
      🏠
      <span>Baza</span>
    </button>
    <button class="bottom-nav__item" onclick="location.href='hub.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
      Hub
    </button>
    <button class="bottom-nav__item" onclick="location.href='library.html'">
      📚
      <span>Knjižnica</span>
    </button>
    <button class="bottom-nav__item" onclick="location.href='profile.html'">
      👤
      <span>Profil</span>
    </button>
  </nav>

  
  

  <!-- Settings panel -->
  <div id="settings-panel" style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center">
    <div style="background:var(--bg-card);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-lg);padding:24px 20px;max-width:320px;width:calc(100% - 32px);display:flex;flex-direction:column;gap:12px">
      <p style="font-family:var(--font-display);font-size:1rem;font-weight:700;letter-spacing:.08em">⚙️ Nastavitve</p>
      <button onclick="lonaReset()" style="padding:11px;border-radius:var(--r-md);background:rgba(255,60,90,.1);border:1px solid rgba(255,60,90,.3);color:var(--neon-red);font-size:.88rem;font-weight:600;font-family:var(--font-body)">🔄 Reset vse podatke</button>
      <button onclick="lonaDebug();document.getElementById('settings-panel').style.display='none'" style="padding:11px;border-radius:var(--r-md);background:#EEF3FD;border:1px solid rgba(37,99,235,.2);color:#2563EB;font-size:.88rem;font-weight:600;font-family:var(--font-body)">🔍 Debug (konzola)</button>
      <button onclick="document.getElementById('settings-panel').style.display='none'" style="padding:11px;border-radius:var(--r-md);border:1px solid rgba(255,255,255,.1);color:var(--text-secondary);font-size:.88rem;font-weight:600;font-family:var(--font-body)">Zapri</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="engine/gatekeeper.js"></script>
  <script src="engine/xp.js"></script>
  <script src="engine/cooldown.js"></script>
  <script src="engine/joker.js"></script>
  <script src="engine/actionPrompt.js"></script>
  <script src="engine/mastery.js"></script>
  <script src="engine/season.js"></script>
  <script src="engine/equipment.js"></script>
  <script src="engine/eq.js"></script>
  <script src="engine/bank.js"></script>
  <script src="engine/attributes.js"></script>
  <script src="engine/progressive.js"></script>
  <script src="engine/streak.js"></script>
  <script src="engine/custom_missions.js"></script>
  <script src="engine/scholar.js"></script>
  <script src="engine.js"></script>

  <script>
  // Redirect na login če ni izbranega agenta
  if (!localStorage.getItem("lona_current_agent")) {
    location.replace("index.html");
  }

  // Settings panel — zapri ob kliku zunaj
  document.getElementById("settings-panel").addEventListener("click", (e) => {
    if (e.target === document.getElementById("settings-panel")) {
      document.getElementById("settings-panel").style.display = "none";
    }
  });
  </script>
  <script>
    // Osveži cmd panel ko se vrneš na stran (foto sprememba)
  window.addEventListener('focus', () => {
    if (typeof renderCmdAgents === 'function') renderCmdAgents();
  });
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && typeof renderCmdAgents === 'function') renderCmdAgents();
  });

  if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>

  <!-- DEBUG OVERLAY za mobilni -->
  <div id="debug-overlay" style="display:none;position:fixed;bottom:90px;left:10px;right:10px;z-index:99999;background:rgba(0,0,0,.9);color:#0f0;font-size:.7rem;font-family:monospace;padding:10px;border-radius:10px;max-height:200px;overflow-y:auto;border:1px solid #0f0"></div>
  <script>
  // Pokaži overlay z dvojnim tapom
  let taps = 0;
  document.addEventListener('touchstart', () => {
    taps++;
    if (taps >= 5) {
      document.getElementById('debug-overlay').style.display = 'block';
      taps = 0;
    }
    setTimeout(() => taps = 0, 1000);
  });

  // Ujemi vse napake
  window.onerror = function(msg, src, line, col, err) {
    const el = document.getElementById('debug-overlay');
    el.style.display = 'block';
    el.innerHTML += '<div style="color:#f55;margin-bottom:4px">❌ ' + msg + '<br><span style="color:#888">' + (src||'').split('/').pop() + ':' + line + '</span></div>';
    return false;
  };
  window.addEventListener('unhandledrejection', e => {
    const el = document.getElementById('debug-overlay');
    el.style.display = 'block';
    el.innerHTML += '<div style="color:#fa0;margin-bottom:4px">⚠️ ' + (e.reason?.message || e.reason) + '</div>';
  });
  </script>
</body>
</html>
