<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0F1A0F"/>
<link rel="manifest" href="manifest.json"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>LONA OS — Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#0a120a;color:#F7F4EF;min-height:100dvh;padding-bottom:100px;overflow-x:hidden}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(10,18,10,.95);border-bottom:1px solid rgba(90,175,122,.1);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.top-bar__logo{font-family:'DM Serif Display',serif;font-size:1rem;color:#F7F4EF;letter-spacing:.06em;flex-shrink:0}
.logo-accent{color:#5AAF7A}
.top-bar__agent{flex:1;display:flex;align-items:center;gap:6px;cursor:pointer;justify-content:center}
.top-bar__agent-name{font-size:.72rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(247,244,239,.45)}
.status-dot{width:6px;height:6px;border-radius:50%;background:#5AAF7A;flex-shrink:0}

/* CMD PANEL */
#cmd-panel-section{padding:0 16px}

/* VIEW TABS */
.view-tabs{display:flex;gap:0;padding:12px 16px 0;position:relative}
.view-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s ease;-webkit-tap-highlight-color:transparent}
.view-tab__icon{font-size:20px}
.view-tab__label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(247,244,239,.3);transition:color .2s ease}
.view-tab--active .view-tab__label{color:#F7F4EF}
.view-tab--eq{border-bottom-color:transparent}.view-tab--eq.view-tab--active{border-bottom-color:#AF52DE}
.view-tab--indoor{border-bottom-color:transparent}.view-tab--indoor.view-tab--active{border-bottom-color:#5AAF7A}
.view-tab--outdoor{border-bottom-color:transparent}.view-tab--outdoor.view-tab--active{border-bottom-color:#34C759}
.view-tab--all{border-bottom-color:transparent}.view-tab--all.view-tab--active{border-bottom-color:#5AC8FA}

/* VIEWS */
.view{display:none;animation:fadeIn .25s ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* CAROUSEL */
.cat-carousel{display:flex;gap:12px;padding:16px 16px 8px;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cat-carousel::-webkit-scrollbar{display:none}
.cat-tile{flex-shrink:0;width:150px;height:90px;border-radius:18px;position:relative;overflow:hidden;scroll-snap-align:start;cursor:pointer;transition:transform .2s ease,filter .2s ease,box-shadow .2s ease;border:2px solid transparent;-webkit-tap-highlight-color:transparent}
.cat-tile:active{transform:scale(.94)!important}
.cat-tile.active{border-color:rgba(255,255,255,.3);box-shadow:0 8px 32px rgba(0,0,0,.6);transform:scale(1.04)}
.cat-tile:not(.active){filter:brightness(.65);transform:scale(.96)}
.cat-tile__bg{position:absolute;inset:0}
.cat-tile__overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 65%)}
.cat-tile__body{position:absolute;bottom:0;left:0;right:0;padding:10px 12px}
.cat-tile__icon{font-size:16px;display:block;margin-bottom:2px}
.cat-tile__name{font-size:12px;font-weight:800;color:#fff;margin:0}
.cat-tile__count{font-size:10px;color:rgba(255,255,255,.5);margin:1px 0 0}

/* DRAWER */
.drawer{background:rgba(12,20,12,.98);border-radius:20px 20px 0 0;margin-top:4px;padding:0 16px 16px}
.drawer-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,.12);margin:10px auto 14px}
.drawer-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.drawer-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:#F7F4EF}
.drawer-meta{display:flex;align-items:center;gap:8px}
.daily-dots{display:flex;gap:4px;align-items:center}
.daily-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:background .3s ease}
.daily-dot.done{background:#5AAF7A}
.daily-dot.locked{background:#FF3B30}
.shuffle-btn{padding:5px 12px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(247,244,239,.55);font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-tap-highlight-color:transparent}
.shuffle-btn:active{transform:scale(.95)}

/* MISSION CARDS */
.mission-list{display:flex;flex-direction:column;gap:7px}
.mc{display:flex!important;align-items:center;gap:12px;padding:12px 14px;border-radius:15px;cursor:pointer;-webkit-tap-highlight-color:transparent;opacity:0;transform:translateY(10px);animation:none!important}
.mc.mc-in{opacity:1!important;transform:translateY(0)!important;transition:opacity .28s ease,transform .28s ease}
.mc:active{transform:scale(.97);filter:brightness(1.1)}
.mc.mc-locked{opacity:.38;cursor:not-allowed}
.mc__icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.mc__body{flex:1;min-width:0}
.mc__name{font-size:13px;font-weight:700;color:#F7F4EF;margin:0;line-height:1.2}
.mc__desc{font-size:11px;color:rgba(247,244,239,.38);margin:2px 0 0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc__right{flex-shrink:0;text-align:right}
.mc__xp{font-size:14px;font-weight:800;margin:0;line-height:1}
.mc__joker{font-size:10px;color:#FFD60A;margin:2px 0 0;font-weight:700}
.mc__joker-btn{padding:4px 9px;border-radius:9px;background:rgba(255,209,102,.15);border:1px solid rgba(255,209,102,.35);color:#FFD60A;font-size:11px;font-weight:800;cursor:pointer;margin-top:4px;display:block;font-family:'DM Sans',sans-serif}
.mc__joker-btn:active{transform:scale(.93)}

/* RIBBON (vse misije) */
.ribbon-wrap{padding:8px 16px 0}
.ribbon{display:flex;flex-direction:column;gap:6px}
.rb{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:13px;cursor:pointer;transition:transform .15s ease;-webkit-tap-highlight-color:transparent;opacity:0;transform:translateX(-6px)}
.rb.rb-in{opacity:1;transform:translateX(0);transition:opacity .25s ease,transform .25s ease}
.rb:nth-child(odd).rb-in{transform:translateX(0)}
.rb:active{transform:scale(.97)}
.rb__icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.rb__body{flex:1;min-width:0}
.rb__name{font-size:13px;font-weight:700;color:#F7F4EF;margin:0}
.rb__cat{font-size:10px;color:rgba(247,244,239,.38);margin:1px 0 0}
.rb__xp{font-size:12px;font-weight:800;flex-shrink:0}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:400px;display:flex;background:rgba(10,18,10,.94);border:1px solid rgba(90,175,122,.18);border-radius:24px;padding:8px 12px;gap:0;z-index:100;backdrop-filter:blur(16px);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.bottom-nav__item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 4px;cursor:pointer;position:relative;background:none;border:none;-webkit-tap-highlight-color:transparent}
.bottom-nav__item svg{width:22px;height:22px}
.bottom-nav__item span{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(247,244,239,.3)}
.bottom-nav__item--active span{color:#5AAF7A;font-weight:800}
.bottom-nav__item--active::after{content:"";position:absolute;bottom:-4px;width:4px;height:4px;border-radius:50%;background:#5AAF7A}

/* SETTINGS */
.settings-overlay{display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center}

/* ── LOCATION PICKER ─────────────────────────────────── */
.loc-pick-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px 0}
.loc-pick-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 6px;
  border-radius:16px;border:1.5px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);cursor:pointer;transition:all .2s ease;
  -webkit-tap-highlight-color:transparent;font-family:var(--font-body)}
.loc-pick-btn:active{transform:scale(.93)}
.loc-pick-btn__icon{font-size:22px;line-height:1}
.loc-pick-btn__label{font-size:10px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:rgba(247,244,239,.4)}
.loc-pick-btn--active{transform:scale(1.04)}
.loc-pick-btn--eq.loc-pick-btn--active{background:rgba(175,82,222,.18);border-color:rgba(175,82,222,.5)}
.loc-pick-btn--eq.loc-pick-btn--active .loc-pick-btn__label{color:#CF8FFF}
.loc-pick-btn--indoor.loc-pick-btn--active{background:rgba(90,175,122,.15);border-color:rgba(90,175,122,.4)}
.loc-pick-btn--indoor.loc-pick-btn--active .loc-pick-btn__label{color:#5AAF7A}
.loc-pick-btn--outdoor.loc-pick-btn--active{background:rgba(52,199,89,.12);border-color:rgba(52,199,89,.35)}
.loc-pick-btn--outdoor.loc-pick-btn--active .loc-pick-btn__label{color:#34C759}
.loc-pick-btn--all.loc-pick-btn--active{background:rgba(90,200,250,.1);border-color:rgba(90,200,250,.3)}
.loc-pick-btn--all.loc-pick-btn--active .loc-pick-btn__label{color:#5AC8FA}

/* ── RANDOM MISSION CARD ─────────────────────────────── */
.rmc{border-radius:20px;overflow:hidden;position:relative;
  min-height:160px;display:flex;flex-direction:column;justify-content:flex-end;
  animation:rmc-in .35s cubic-bezier(.34,1.56,.64,1) both}
@keyframes rmc-in{from{opacity:0;transform:scale(.9) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.rmc__bg{position:absolute;inset:0}
.rmc__overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.1) 60%,transparent 100%)}
.rmc__body{position:relative;padding:16px 18px 14px}
.rmc__icon{font-size:2.2rem;display:block;margin-bottom:6px}
.rmc__name{font-family:var(--font-display);font-size:1.4rem;color:#fff;margin:0 0 3px;line-height:1.2}
.rmc__desc{font-size:.78rem;color:rgba(255,255,255,.55);margin:0 0 12px}
.rmc__actions{display:flex;gap:8px}
.rmc__btn{flex:1;padding:11px;border-radius:13px;font-size:.85rem;font-weight:800;
  font-family:var(--font-body);cursor:pointer;transition:all .15s ease;border:none;
  -webkit-tap-highlight-color:transparent}
.rmc__btn:active{transform:scale(.95)}
.rmc__btn--do{background:rgba(255,255,255,.95);color:#0a120a}
.rmc__btn--skip{background:rgba(255,209,102,.2);border:1px solid rgba(255,209,102,.4)!important;color:#FFD60A}
.rmc__btn--next{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7)}
.rmc__xp{font-size:.78rem;font-weight:700;color:#fff;opacity:.7;text-align:right;margin-bottom:4px}


/* Hub/Library specifično */
.top-bar__meta{flex:1;display:flex;align-items:center;gap:6px;justify-content:center}
.top-bar__title{font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(247,244,239,.4)}
.top-bar__alert{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(247,244,239,.5);font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.main-scroll{padding:16px;display:flex;flex-direction:column;gap:12px;max-width:480px;margin:0 auto}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:4px 2px;margin-bottom:8px}
.section-header__title{font-family:'DM Serif Display',serif;font-size:.95rem;color:rgba(247,244,239,.7);font-weight:400}
.section-header__badge{font-size:.65rem;font-weight:600;color:rgba(247,244,239,.35);padding:3px 8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:20px}
h2,h3{font-family:'DM Serif Display',serif;color:#F7F4EF;font-weight:400}
p,span,label{color:#F7F4EF}
select,input,textarea{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#F7F4EF;padding:8px 10px;font-family:'DM Sans',sans-serif;font-size:.88rem;outline:none}
select option{background:#1a2b1a}
button{font-family:'DM Sans',sans-serif}
/* Mastery */
.mastery-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;margin-bottom:8px}
.mastery-section{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;margin-bottom:8px}
/* Hub specifično */
.hub-stat__val{font-family:'DM Serif Display',serif;font-size:1.4rem;color:#5AAF7A}
.hub-stat__lbl{font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(247,244,239,.4)}
.day-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.day-row:last-child{border-bottom:none}
.day-row__name{font-size:.72rem;font-weight:700;color:rgba(247,244,239,.5);width:30px;flex-shrink:0;text-transform:uppercase;letter-spacing:.06em}
.day-row__name--today{color:#5AAF7A}
.day-row__missions{display:flex;gap:5px;flex:1;flex-wrap:wrap}
.day-mission-chip{font-size:.68rem;font-weight:600;padding:3px 8px;border-radius:20px;cursor:pointer;background:rgba(45,125,82,.12);color:#5AAF7A;border:1px solid rgba(45,125,82,.2)}
.day-mission-chip--remove{background:rgba(255,59,48,.1);color:#FF6B6B;border-color:rgba(255,59,48,.2)}
.day-row__add{font-size:.7rem;color:rgba(247,244,239,.4);cursor:pointer;padding:3px 8px;border-radius:20px;border:1px dashed rgba(255,255,255,.15);white-space:nowrap}
.bank-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.08);cursor:pointer;background:rgba(255,255,255,.04);margin-bottom:6px}
.bank-item:hover{background:rgba(45,125,82,.12);border-color:#5AAF7A}
.bank-item__icon{font-size:1.1rem;flex-shrink:0}
.bank-item__name{font-size:.82rem;font-weight:600;color:#F7F4EF}
.bank-item__xp{font-size:.65rem;color:#5AAF7A;font-weight:600}
.bank-item__add{font-size:.75rem;font-weight:700;color:rgba(247,244,239,.3);width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.season-teaser{background:rgba(255,149,0,.08);border:1px solid rgba(255,149,0,.2);border-radius:16px;padding:16px;display:flex;align-items:center;gap:14px}
.briefing-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;border-radius:14px;background:rgba(255,255,255,.06);color:#F7F4EF;font-size:1rem;font-weight:600;border:1px solid rgba(255,255,255,.1);cursor:pointer;width:100%}
.briefing-btn:hover{background:rgba(45,125,82,.12);border-color:#5AAF7A}
/* Library */
.mastery-card__header{display:flex;align-items:center;gap:10px;cursor:pointer}
.mastery-card__caret{margin-left:auto;color:rgba(247,244,239,.4)}
.mastery-card__body{display:none;padding-top:12px}
.mastery-card--open .mastery-card__body{display:block}
.mastery-level{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.mastery-level:last-child{border-bottom:none}

</style>

<body>

<!-- TOP BAR -->
<header class="top-bar">
  <p class="top-bar__logo" onclick="location.replace('index.html')" style="cursor:pointer"><span class="logo-bracket">[</span>LONA<span class="logo-accent">_OS</span><span class="logo-bracket">]</span></p>
  <div class="top-bar__meta">
    <span class="status-dot"></span>
    <span class="top-bar__title">Globalni Hub</span>
  </div>
  <button class="top-bar__alert" onclick="location.replace('home.html')" title="Nazaj">⬅</button>
</header>

<main class="main-scroll">

  <!-- AGENTI PREGLED -->
  <div id="hub-agents"></div>

  <!-- DNEVNI NAPREDEK -->
  <div class="card">
    <div class="section-header">
      <h3 class="section-header__title">📅 Danes</h3>
      <span class="section-header__badge" id="hub-daily-badge">0/4</span>
    </div>
    <div id="hub-daily-dots" style="display:flex;gap:8px;align-items:center;margin-bottom:12px"></div>
    <div id="hub-today-missions" style="font-size:.82rem;color:rgba(247,244,239,.4);text-align:center;padding:8px 0">Danes še ni opravljenih misij.</div>
  </div>

  <!-- TEDENSKA LESTVICA -->
  <div class="card">
    <div class="section-header">
      <h3 class="section-header__title">🏆 Ta teden</h3>
      <span class="section-header__badge" id="hub-week-badge"></span>
    </div>
    <div id="hub-leaderboard"></div>
  </div>

  <!-- ZADNJE MISIJE -->
  <div class="card">
    <div class="section-header">
      <h3 class="section-header__title">📋 Zgodovina</h3>
      <span class="section-header__badge" id="hub-log-count"></span>
    </div>
    <div id="hub-log"></div>
  </div>

  <!-- COMMANDER BLIŽNJICA -->
  <button onclick="location.href='commander.html'" style="width:100%;padding:16px;border-radius:16px;background:rgba(175,82,222,.12);border:1px solid rgba(175,82,222,.25);color:#CF8FFF;font-size:.95rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
    🎖️ Commander Panel
  </button>

</main>

<!-- BOTTOM NAV -->


<script src="config.js"></script>
<script src="engine/xp.js"></script>
<script src="engine/joker.js"></script>
<script src="engine/cooldown.js"></script>
<script src="engine/streak.js"></script>
<script>
if(typeof initXp==="function") initXp();
if(typeof initJokers==="function") initJokers();
if(typeof initCoins==="function") initCoins();

function weekKey() {
  const d = new Date();
  const w = Math.floor((d - new Date(d.getFullYear(),0,1)) / 604800000);
  return `lona_season_${d.getFullYear()}_w${w}`;
}

function getWeekXp(agentId) {
  return JSON.parse(localStorage.getItem(weekKey()) || '{}')[agentId] || 0;
}

function getDailyCount(agentId) {
  return parseInt(localStorage.getItem(`lona_daily_${agentId}_${new Date().toDateString()}`) || '0');
}

function renderHub() {
  // Agenti
  const agentsEl = document.getElementById('hub-agents');
  agentsEl.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">' +
    LONA_CONFIG.agents.map(a => {
      const xp     = typeof getXp    === "function" ? getXp(a.id)    : 0;
      const maxXp  = typeof getMaxXp === "function" ? getMaxXp(a.id) : 0;
      const coins  = typeof getCoins === "function" ? getCoins(a.id) : 0;
      const jokers = typeof getJokers=== "function" ? getJokers(a.id): 0;
      const rank   = LONA_CONFIG.ranks.slice().reverse().find(r => maxXp >= r.minXp)?.label || LONA_CONFIG.ranks[0].label;
      const photo  = localStorage.getItem("lona_photo_" + a.id);
      const daily  = getDailyCount(a.id);
      const av     = photo ? `<img src="${photo}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : a.avatar;
      return `<div class="card" style="display:flex;flex-direction:column;gap:8px">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="width:40px;height:40px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;border:2px solid rgba(90,175,122,.3)">${av}</div>
          <div>
            <p style="font-weight:800;font-size:.95rem;margin:0">${a.name}</p>
            <p style="font-size:.6rem;color:#FFD60A;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin:0">${rank}</p>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          <div style="text-align:center;padding:6px;background:rgba(90,175,122,.08);border-radius:10px;border:1px solid rgba(90,175,122,.15)">
            <p style="font-size:1.1rem;font-weight:800;color:#5AAF7A;margin:0">${xp}</p>
            <p style="font-size:.55rem;color:rgba(247,244,239,.4);margin:0;text-transform:uppercase">XP</p>
          </div>
          <div style="text-align:center;padding:6px;background:rgba(255,214,10,.06);border-radius:10px;border:1px solid rgba(255,214,10,.15)">
            <p style="font-size:1.1rem;font-weight:800;color:#FFD60A;margin:0">${coins}</p>
            <p style="font-size:.55rem;color:rgba(247,244,239,.4);margin:0;text-transform:uppercase">🪙</p>
          </div>
        </div>
        <div style="display:flex;gap:4px;align-items:center">
          ${Array.from({length:4},(_,i)=>`<div style="width:10px;height:10px;border-radius:50%;background:${i<daily?'#5AAF7A':'rgba(255,255,255,.12)'}"></div>`).join("")}
          <span style="font-size:.65rem;color:rgba(247,244,239,.4);margin-left:4px">${daily}/4 danes</span>
        </div>
      </div>`;
    }).join('') + '</div>';

  // Dnevni napredek — skupaj
  const agentId = LONA_CONFIG.agents[0].id;
  const daily = getDailyCount(agentId);
  document.getElementById('hub-daily-badge').textContent = daily + '/4';
  const dotsEl = document.getElementById('hub-daily-dots');
  dotsEl.innerHTML = Array.from({length:4},(_,i) =>
    `<div style="width:12px;height:12px;border-radius:50%;background:${i<daily?'#5AAF7A':'rgba(255,255,255,.12)'}"></div>`
  ).join('') + (daily >= 4 ? '<span style="font-size:.8rem;color:#5AAF7A;font-weight:700;margin-left:6px">🏆 Limit dosežen!</span>' : '');

  // Danes opravljene misije
  const log = JSON.parse(localStorage.getItem('lona_mission_log') || '[]');
  const today = new Date().toDateString();
  const todayLog = log.filter(e => new Date(e.date).toDateString() === today).reverse();
  const todayEl = document.getElementById('hub-today-missions');
  if (todayLog.length) {
    todayEl.innerHTML = todayLog.map(e => {
      const m = LONA_CONFIG.missions[e.missionId];
      const agent = LONA_CONFIG.agents.find(a => a.id === e.agentId);
      return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06)">
        <span style="font-size:1rem">${m?.icon||'📋'}</span>
        <div style="flex:1">
          <p style="font-size:.82rem;font-weight:700;margin:0">${m?.label||e.missionId}</p>
          <p style="font-size:.65rem;color:rgba(247,244,239,.4);margin:0">${agent?.name||e.agentId}</p>
        </div>
        <span style="font-size:.82rem;font-weight:800;color:#5AAF7A">+${e.xp} XP</span>
      </div>`;
    }).join('');
  } else {
    todayEl.innerHTML = '<p style="font-size:.82rem;color:rgba(247,244,239,.35);text-align:center;padding:12px 0">Danes še ni opravljenih misij.</p>';
  }

  // Tedenska lestvica
  const weekEl = document.getElementById('hub-leaderboard');
  const board = LONA_CONFIG.agents
    .map(a => ({ ...a, weekXp: getWeekXp(a.id) }))
    .sort((a,b) => b.weekXp - a.weekXp);
  const weekBadge = document.getElementById('hub-week-badge');
  weekBadge.textContent = board.map(a => a.weekXp + ' XP').join(' · ');
  weekEl.innerHTML = board.map((a,i) => {
    const photo = localStorage.getItem("lona_photo_" + a.id);
    const av = photo ? `<img src="${photo}" style="width:32px;height:32px;border-radius:50%;object-fit:cover">` : `<span style="font-size:1.1rem">${a.avatar}</span>`;
    const medals = ['🥇','🥈','🥉'];
    return `<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)">
      <span style="font-size:1.2rem;width:24px">${medals[i]||''}</span>
      <div style="width:32px;height:32px;border-radius:50%;overflow:hidden;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0">${av}</div>
      <p style="flex:1;font-weight:700;margin:0">${a.name}</p>
      <p style="font-family:'DM Serif Display',serif;font-size:1.1rem;color:#5AAF7A;margin:0">${a.weekXp} XP</p>
    </div>`;
  }).join('');

  // Zgodovina — zadnjih 15
  const logEl = document.getElementById('hub-log');
  const logCount = document.getElementById('hub-log-count');
  logCount.textContent = log.length + ' skupaj';
  if (!log.length) {
    logEl.innerHTML = '<p style="font-size:.82rem;color:rgba(247,244,239,.35);text-align:center;padding:12px 0">Še ni zgodovine.</p>';
    return;
  }
  logEl.innerHTML = [...log].reverse().slice(0,15).map(e => {
    const m = LONA_CONFIG.missions[e.missionId];
    const agent = LONA_CONFIG.agents.find(a => a.id === e.agentId);
    const date = new Date(e.date).toLocaleDateString('sl-SI',{day:'numeric',month:'short'});
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05)">
      <span style="font-size:1rem;flex-shrink:0">${m?.icon||'📋'}</span>
      <div style="flex:1;min-width:0">
        <p style="font-size:.82rem;font-weight:600;margin:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m?.label||e.missionId}</p>
        <p style="font-size:.62rem;color:rgba(247,244,239,.4);margin:0">${agent?.name||e.agentId} · ${date}</p>
      </div>
      <p style="font-size:.82rem;font-weight:800;color:${e.compromised?'#FF6B6B':'#5AAF7A'};margin:0;flex-shrink:0">${e.compromised?'⚠️':'+'}${e.xp} XP</p>
    </div>`;
  }).join('');
}

document.addEventListener('DOMContentLoaded', renderHub);
window.addEventListener('pageshow', renderHub);
</script>
