<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" href="favicon.ico"/>

<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0F1A0F"/>
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>LONA OS — Profil</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans",sans-serif;background:#0F1A0F;min-height:100dvh;padding-bottom:100px;color:#F7F4EF}
.top-bar{display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(15,26,15,.95);border-bottom:1px solid rgba(90,175,122,.12);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.top-bar__logo{font-family:"DM Serif Display",serif;font-size:1rem;color:#F7F4EF;letter-spacing:.06em}
.logo-accent{color:#5AAF7A}
.top-bar__title{flex:1;font-size:.7rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(247,244,239,.4);text-align:center}
.main-scroll{padding:16px;display:flex;flex-direction:column;gap:12px}
.agent-switcher{display:flex;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:4px}
.agent-switcher__btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;border-radius:14px;font-family:"DM Sans",sans-serif;font-size:.88rem;font-weight:500;color:rgba(247,244,239,.4);transition:all 200ms ease;cursor:pointer}
.agent-switcher__btn--active{background:rgba(45,125,82,.2);border:1px solid rgba(90,175,122,.3);color:#F7F4EF}
.profile-hero{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:20px;position:relative;overflow:hidden}
.profile-hero::after{content:"";position:absolute;top:-60px;right:-60px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(45,125,82,.12) 0%,transparent 70%);pointer-events:none}
.profile-hero__top{display:flex;align-items:center;gap:16px;margin-bottom:16px}
.profile-hero__avatar-wrap{position:relative;flex-shrink:0;cursor:pointer}
.profile-hero__avatar{width:68px;height:68px;border-radius:50%;background:rgba(45,125,82,.15);border:2px solid rgba(90,175,122,.4);display:flex;align-items:center;justify-content:center;font-size:2rem;overflow:hidden}
.profile-hero__avatar img{width:100%;height:100%;object-fit:cover;object-position:center top}
.avatar-edit-badge{position:absolute;bottom:-2px;right:-2px;width:22px;height:22px;border-radius:50%;background:#2D7D52;border:2px solid #0F1A0F;display:flex;align-items:center;justify-content:center;font-size:.65rem}
.profile-hero__info{flex:1}
.profile-hero__name{font-family:"DM Serif Display",serif;font-size:1.5rem;color:#F7F4EF;line-height:1.1}
.profile-hero__rank{font-size:.65rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#5AAF7A;margin-top:3px}
.profile-hero__xp-badge{text-align:right}
.profile-hero__xp-val{font-family:"DM Serif Display",serif;font-size:2rem;color:#5AAF7A;line-height:1}
.profile-hero__xp-lbl{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(247,244,239,.3)}
.xp-bar-track{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:6px}
.xp-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#2D7D52,#5AAF7A);transition:width .8s ease}
.xp-bar-meta{display:flex;justify-content:space-between;font-size:.65rem;color:rgba(247,244,239,.3)}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:16px}
.stat-chip{display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px}
.stat-chip__val{font-family:"DM Serif Display",serif;font-size:1.2rem;color:#F7F4EF}
.stat-chip__lbl{font-size:.58rem;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:rgba(247,244,239,.35)}
.stat-chip--joker .stat-chip__val{color:#FFD60A}
.stat-chip--missions .stat-chip__val{color:#5AAF7A}
.stat-chip--books .stat-chip__val{color:#5AC8FA}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:4px 2px}
.section-header__title{font-family:"DM Serif Display",serif;font-size:.95rem;color:rgba(247,244,239,.6);font-weight:400}
.section-header__badge{font-size:.65rem;font-weight:600;letter-spacing:.08em;color:rgba(247,244,239,.3)}
.rewards-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.reward-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px;display:flex;flex-direction:column;gap:8px}
.reward-card__eyebrow{font-size:.58rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(247,244,239,.3)}
.reward-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:12px;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02);cursor:pointer;transition:all 180ms ease}
.reward-row:active{transform:scale(.97)}
.reward-row--unlocked{border-color:rgba(255,209,102,.3);background:rgba(255,209,102,.06)}
.reward-row__icon{font-size:.9rem}
.reward-row__name{flex:1;font-size:.72rem;font-weight:500;color:rgba(247,244,239,.5)}
.reward-row--unlocked .reward-row__name{color:#F7F4EF}
.reward-row__cost{font-size:.68rem;font-weight:700;color:rgba(247,244,239,.25)}
.reward-row--unlocked .reward-row__cost{color:#FFD60A}
.mastery-list{display:flex;flex-direction:column;gap:8px}
.mastery-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px}
.mastery-item__icon{font-size:1.4rem;flex-shrink:0}
.mastery-item__info{flex:1}
.mastery-item__name{font-size:.85rem;font-weight:600;color:#F7F4EF}
.mastery-item__level{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(247,244,239,.35);margin-top:2px}
.mastery-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:6px}
.mastery-bar__fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#2D7D52,#5AAF7A);transition:width .6s ease}
.mastery-item__badge{font-size:.72rem;font-weight:700;color:rgba(247,244,239,.3);flex-shrink:0}
.mission-log{display:flex;flex-direction:column;gap:6px}
.log-entry{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:14px;border-left:3px solid rgba(90,175,122,.4)}
.log-entry--compromised{border-left-color:rgba(255,60,90,.4)}
.log-entry__icon{font-size:1rem;flex-shrink:0}
.log-entry__body{flex:1;min-width:0}
.log-entry__mission{font-size:.8rem;font-weight:600;color:#F7F4EF}
.log-entry__mod{font-size:.65rem;color:rgba(247,244,239,.4);margin-top:1px}
.log-entry__right{text-align:right;flex-shrink:0}
.log-entry__xp{font-family:"DM Serif Display",serif;font-size:.88rem;color:#5AAF7A}
.log-entry--compromised .log-entry__xp{color:#FF3B30}
.log-entry__date{font-size:.6rem;color:rgba(247,244,239,.3)}
.log-empty{text-align:center;padding:24px;color:rgba(247,244,239,.3);font-size:.82rem}
/* ── JOKER DIALOG (za nagrade) ─── */
.joker-dialog{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px}
.joker-dialog__box{background:#1C2B1C;border:1px solid rgba(90,175,122,.25);border-radius:24px;padding:24px 20px;max-width:320px;width:100%;display:flex;flex-direction:column;align-items:center;gap:10px}
.joker-dialog__icon{font-size:2.5rem}
.joker-dialog__title{font-family:"DM Serif Display",serif;font-size:1.2rem;color:#F7F4EF;text-align:center}
.joker-dialog__body{font-size:.88rem;color:rgba(247,244,239,.7);text-align:center;line-height:1.5}
.joker-dialog__btns{display:flex;gap:8px;width:100%;margin-top:4px}
.joker-dialog__cancel{flex:1;padding:12px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(247,244,239,.6);font-size:.88rem;font-weight:600;cursor:pointer;font-family:"DM Sans",sans-serif}
.joker-dialog__confirm{flex:2;padding:12px;border-radius:14px;background:rgba(45,125,82,.3);border:1px solid rgba(90,175,122,.4);color:#F7F4EF;font-size:.88rem;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif}

.bottom-nav{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:400px;display:flex;background:rgba(15,26,15,.92);border:1px solid rgba(90,175,122,.18);border-radius:24px;padding:8px 12px;gap:0;z-index:100;backdrop-filter:blur(16px);box-shadow:0 4px 24px rgba(0,0,0,.5)}
.bottom-nav__item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:7px 4px;cursor:pointer;position:relative;background:none;border:none;-webkit-tap-highlight-color:transparent}
.bottom-nav__item svg{width:22px;height:22px;transition:all 200ms ease}
.bottom-nav__item span{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(247,244,239,.3);transition:color 200ms ease}
.bottom-nav__item--active span{color:#5AAF7A;font-weight:800}
.bottom-nav__item--active svg{stroke:#5AAF7A}
.bottom-nav__item--active::after{content:"";position:absolute;bottom:-4px;width:4px;height:4px;border-radius:50%;background:#5AAF7A}
</style>
</head>
<body>
<header class="top-bar">
  <div class="top-bar__logo">[LONA<span class="logo-accent">_OS</span>]</div>
  <span class="top-bar__title">Profil Agenta</span>
</header>
<main class="main-scroll">
  <div class="agent-switcher" id="agent-switcher"></div>
  <div class="profile-hero">

    <div class="profile-hero__top">
      <div class="profile-hero__avatar-wrap">
        <div class="profile-hero__avatar" id="hero-avatar">⚡</div>
        <div class="avatar-edit-badge">📷</div>
      </div>
      <div class="profile-hero__info">
        <p class="profile-hero__name" id="hero-name">—</p>
        <p class="profile-hero__rank" id="hero-rank">—</p>
      </div>
      <div class="profile-hero__xp-badge">
        <p class="profile-hero__xp-val" id="hero-xp">0</p>
        <p class="profile-hero__xp-lbl">XP skupaj</p>
      </div>
    </div>
    <div class="xp-bar-track"><div class="xp-bar-fill" id="hero-bar" style="width:0%"></div></div>
    <div class="xp-bar-meta">
      <span id="hero-bar-lo">0</span>
      <span id="hero-bar-next">Naslednji rang</span>
      <span id="hero-bar-hi">—</span>
    </div>
    <div class="profile-stats">
      <div class="stat-chip stat-chip--missions"><span class="stat-chip__val" id="stat-missions">0</span><span class="stat-chip__lbl">Misij</span></div>
      <div class="stat-chip stat-chip--joker"><span class="stat-chip__val" id="stat-jokers">0</span><span class="stat-chip__lbl">Jokerji</span></div>
      <div class="stat-chip stat-chip--books"><span class="stat-chip__val" id="stat-books">0</span><span class="stat-chip__lbl">Knjige</span></div>
    </div>
  </div>
  <div class="section-header"><h3 class="section-header__title">🏆 Nagrade</h3></div>
  <div class="rewards-grid">
    <div class="reward-card reward-card--personal">
      <p class="reward-card__eyebrow">Osebno</p>
      <div class="reward-row" data-cost="20"><span class="reward-row__icon">🍫</span><span class="reward-row__name">Čokolada</span><span class="reward-row__cost">20 XP</span></div>
      <div class="reward-row" data-cost="40"><span class="reward-row__icon">🍦</span><span class="reward-row__name">Sladoled</span><span class="reward-row__cost">40 XP</span></div>
      <div class="reward-row" data-cost="80"><span class="reward-row__icon">🛒</span><span class="reward-row__name">Izbira v trgovini</span><span class="reward-row__cost">80 XP</span></div>
    </div>
    <div class="reward-card reward-card--shared">
      <p class="reward-card__eyebrow">Skupaj</p>
      <div class="reward-row" data-cost="40" data-shared="true"><span class="reward-row__icon">📺</span><span class="reward-row__name">Risanka</span><span class="reward-row__cost">40 XP</span></div>
      <div class="reward-row" data-cost="150" data-shared="true"><span class="reward-row__icon">🏕️</span><span class="reward-row__name">Tabor doma</span><span class="reward-row__cost">150 XP</span></div>
      <div class="reward-row" data-cost="500" data-shared="true"><span class="reward-row__icon">🎬</span><span class="reward-row__name">Kino večer</span><span class="reward-row__cost">500 XP</span></div>
    </div>
  </div>
  <div class="section-header" style="margin-top:4px"><h3 class="section-header__title">⚔️ Mojstrstvo</h3></div>
  <div class="mastery-list" id="profile-mastery"></div>
  <div class="section-header" style="margin-top:4px">
    <h3 class="section-header__title">📋 Zgodovina</h3>
    <span class="section-header__badge" id="log-count">0 misij</span>
  </div>
  <div class="mission-log" id="mission-log"><div class="log-empty">Še ni opravljenih misij.</div></div>
</main>

<script src="config.js"></script>
<script src="engine/xp.js"></script>
<script src="engine/joker.js"></script>
<script src="engine/mastery.js"></script>
<script src="engine/cooldown.js"></script>
<script src="engine.js"></script>
<script>
if(typeof initXp==="function")initXp();
if(typeof initJokers==="function")initJokers();

function photoKey(id){return"lona_photo_"+id}

function loadAvatar(agentId){
  const el=document.getElementById("hero-avatar");
  const saved=localStorage.getItem(photoKey(agentId));
  const agent=LONA_CONFIG.agents.find(a=>a.id===agentId);
  if(saved){el.innerHTML='<img src="'+saved+'" style="width:100%;height:100%;object-fit:cover;object-position:center top;border-radius:50%">'}
  else{el.textContent=agent?.avatar||"⚡"}
}

function handlePhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      const size=Math.min(img.width,img.height);
      canvas.width=canvas.height=400;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,(img.width-size)/2,(img.height-size)/2,size,size,0,0,400,400);
      const data=canvas.toDataURL("image/jpeg",.8);
      localStorage.setItem(photoKey(currentAgentId),data);
      localStorage.setItem("lona_photo_updated", Date.now());
      loadAvatar(currentAgentId);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function _resolveAgent(){
  const url=new URLSearchParams(location.search).get("agent");
  if(url&&LONA_CONFIG.agents.find(a=>a.id===url))return url;
  const stored=localStorage.getItem("lona_current_agent");
  if(stored&&LONA_CONFIG.agents.find(a=>a.id===stored))return stored;
  return LONA_CONFIG.agents[0].id;
}
let currentAgentId=_resolveAgent();

function renderSwitcher(){
  const sw=document.getElementById("agent-switcher");
  sw.innerHTML=LONA_CONFIG.agents.map(a=>{
    const photo=localStorage.getItem(photoKey(a.id));
    const av=photo?'<img src="'+photo+'" style="width:28px;height:28px;border-radius:50%;object-fit:cover">':'<span>'+a.avatar+'</span>';
    return'<button class="agent-switcher__btn '+(a.id===currentAgentId?"agent-switcher__btn--active":"")+'" data-id="'+a.id+'">'+av+' '+a.name+'</button>';
  }).join("");
  sw.querySelectorAll(".agent-switcher__btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      currentAgentId=btn.dataset.id;
      renderAll();
      sw.querySelectorAll(".agent-switcher__btn").forEach(b=>b.classList.toggle("agent-switcher__btn--active",b.dataset.id===currentAgentId));
    });
  });
}

function renderHero(){
  const a=LONA_CONFIG.agents.find(x=>x.id===currentAgentId);
  const xp=typeof getXp==="function"?getXp(currentAgentId):0;
  const maxXp=typeof getMaxXp==="function"?getMaxXp(currentAgentId):xp;
  const ranks=LONA_CONFIG.ranks;
  const ci=ranks.findIndex(r=>r.minXp>maxXp);
  const lo=ranks[Math.max(0,ci-1)]?.minXp??0;
  const hi=ranks[ci]?.minXp??lo+300;
  const pct=Math.min(100,Math.round(((maxXp-lo)/(hi-lo))*100));
  const rankLabel=[...ranks].reverse().find(r=>maxXp>=r.minXp)?.label||ranks[0].label;
  const jokers=typeof getJokers==="function"?getJokers(currentAgentId):0;
  document.getElementById("hero-name").textContent=a?.name||currentAgentId;
  document.getElementById("hero-rank").textContent=rankLabel;
  document.getElementById("hero-xp").textContent=xp;
  document.getElementById("stat-jokers").textContent=jokers;
  document.getElementById("hero-bar").style.width=pct+"%";
  document.getElementById("hero-bar-lo").textContent=lo;
  document.getElementById("hero-bar-hi").textContent=hi;
  document.getElementById("hero-bar-next").textContent=ranks[ci]?.label??"Kapitan ✓";
  loadAvatar(currentAgentId);
}

function renderRewards(){
  const xp=typeof getXp==="function"?getXp(currentAgentId):0;
  const allXp=Object.values(JSON.parse(localStorage.getItem("lona_xp_state")||"{}")).reduce((s,v)=>s+v,0);
  document.querySelectorAll(".reward-row").forEach(row=>{
    const cost=parseInt(row.dataset.cost);
    const shared=row.dataset.shared==="true";
    row.classList.toggle("reward-row--unlocked",shared?allXp>=cost:xp>=cost);
    row.onclick=()=>{if(typeof claimReward==="function"){claimReward(row);setTimeout(renderRewards,300)}};
  });
}

function renderLog(){
  const log=JSON.parse(localStorage.getItem("lona_mission_log")||"[]").filter(e=>e.agentId===currentAgentId).reverse();
  const logEl=document.getElementById("mission-log");
  document.getElementById("stat-missions").textContent=log.length;
  document.getElementById("log-count").textContent=log.length+" misij";
  const sessions=JSON.parse(localStorage.getItem("lona_scholar_sessions")||"[]").filter(s=>s.agentId===currentAgentId&&s.completed);
  document.getElementById("stat-books").textContent=sessions.length;
  if(!log.length){logEl.innerHTML='<div class="log-empty">Še ni opravljenih misij.</div>';return}
  logEl.innerHTML=log.slice(0,25).map(e=>{
    const m=LONA_CONFIG.missions[e.missionId];
    const date=new Date(e.date).toLocaleDateString("sl-SI",{day:"numeric",month:"short"});
    return'<div class="log-entry'+(e.compromised?" log-entry--compromised":"")+'"><span class="log-entry__icon">'+(m?.icon||"⚡")+'</span><div class="log-entry__body"><p class="log-entry__mission">'+(m?.label||e.missionId)+'</p><p class="log-entry__mod">'+(e.modifier||"—")+(e.compromised?" ⚠️ Površno":"")+'</p></div><div class="log-entry__right"><p class="log-entry__xp">+'+e.xp+' XP</p><p class="log-entry__date">'+date+'</p></div></div>';
  }).join("");
}

function renderMasteryProfile(){
  const el=document.getElementById("profile-mastery");if(!el)return;
  el.innerHTML=Object.values(LONA_CONFIG.masterySkills).map(skill=>{
    const level=typeof getMasteryLevel==="function"?getMasteryLevel(currentAgentId,skill.id):0;
    const lvlDef=skill.levels[level]||skill.levels[0];
    const pct=Math.round((level/(skill.levels.length-1))*100);
    return'<div class="mastery-item"><span class="mastery-item__icon">'+skill.icon+'</span><div class="mastery-item__info"><p class="mastery-item__name">'+skill.label+'</p><p class="mastery-item__level">'+lvlDef.icon+" "+lvlDef.label+'</p><div class="mastery-bar"><div class="mastery-bar__fill" style="width:'+pct+'%"></div></div></div><span class="mastery-item__badge">'+level+"/"+(skill.levels.length-1)+'</span></div>';
  }).join("");
}

function renderAll(){renderHero();renderRewards();renderLog();renderMasteryProfile()}

document.addEventListener("DOMContentLoaded",()=>{renderSwitcher();renderAll()});
window.addEventListener('pageshow', () => { renderAll(); });
</script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{})</script>
